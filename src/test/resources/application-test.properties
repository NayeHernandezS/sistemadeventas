# Perfil de integracion: H2 en memoria, sin servicios externos
spring.config.import=

spring.datasource.url=jdbc:h2:mem:sistema_ventas_it;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.initialization-fail-timeout=-1

spring.flyway.enabled=false

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema-test.sql
spring.sql.init.data-locations=classpath:db/data-test.sql

mercadopago.access-token=
mercadopago.webhook-secret=
app.base-url=http://localhost:8080
spring.mail.host=

app.uploads.dir=target/test-uploads
