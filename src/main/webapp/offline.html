<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#3B136B">
    <title>Sin conexion — Fusion Digital</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            font-family: system-ui, -apple-system, sans-serif;
            background: #f7f4fb;
            color: #2d2d2d;
            text-align: center;
        }
        .card {
            max-width: 360px;
            background: #fff;
            border-radius: 16px;
            padding: 2rem 1.5rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }
        h1 { font-size: 1.25rem; margin: 0 0 0.75rem; color: #5B2A86; }
        p { margin: 0 0 1.25rem; line-height: 1.5; color: #555; }
        button {
            background: #5B2A86;
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Sin conexion a internet</h1>
    <p>No pudimos cargar Fusion Digital. Revisa tu Wi‑Fi o datos moviles e intenta de nuevo.</p>
    <button type="button" onclick="location.reload()">Reintentar</button>
</div>
</body>
</html>
