spring.application.name=sistema-ventas

# Carga opcional .env en la raiz del proyecto (copia desde .env.example)
spring.config.import=optional:file:.env[.properties]

# Base de datos MySQL (variables de entorno o .env)
# DB_URL      -> URL JDBC completa
# DB_USER     -> usuario MySQL
# DB_PASSWORD -> contraseña (obligatoria; no tiene valor por defecto)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/java_curso?serverTimezone=America/Mexico_City}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# No bloquear el arranque si MySQL tarda o no esta disponible al instante
spring.datasource.hikari.initialization-fail-timeout=-1

# Flyway: migraciones versionadas (src/main/resources/db/migration)
# Nuevos cambios de esquema: solo V{n}__descripcion.sql (ver docs/FLYWAY.md)
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Compilar JSP en desarrollo (IntelliJ)
server.jsp-servlet.init-parameters.development=true

app.nombre=Sistema de Ventas

# Logos de marca por tenant (admin); archivos fuera del WAR
app.uploads.dir=${APP_UPLOADS_DIR:uploads}
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Mes de prueba al registrarse (aplica al plan elegido)
suscripcion.meses.gratis=1
# Aviso in-app y correos cuando faltan N dias o menos para vencer
suscripcion.aviso.dias=7
suscripcion.aviso.cron=0 0 8 * * *
# Expiracion de pagos PENDIENTE sin confirmar
suscripcion.pago.pendiente.dias.manual=30
suscripcion.pago.pendiente.dias.mercadopago=15
suscripcion.pago.expiracion.cron=0 30 3 * * *

# Planes: EMPRENDEDOR $149, NEGOCIO $249, PRO $399 (ver PlanSuscripcion.java)

# Usuarios que operan la plataforma (creadora del SaaS). Separados por coma.
# Tambien puedes usar rol SUPER_ADMIN en la tabla usuarios.
plataforma.superadmins=admin

# Datos de contacto que ve el ADMIN en /soporte
soporte.email=soporte@misistema.com
soporte.whatsapp=
soporte.horario=Lunes a viernes, 9:00 - 18:00 (hora Mexico)

# Alerta de stock bajo en inventario y catalogo (unidades)
inventario.stock.minimo=5

# Recuperacion de contraseña
recuperacion.token.horas=2
recuperacion.mail.from=${MAIL_FROM:noreply@misistema.com}
# URL publica de la app (HTTPS en produccion; obligatoria para webhooks de Mercado Pago)
app.base-url=${APP_BASE_URL:}

# Mercado Pago (Mexico - Checkout Pro). Ver .env.example
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:}
mercadopago.webhook-secret=${MERCADOPAGO_WEBHOOK_SECRET:}
mercadopago.currency-id=MXN

# CFDI / Facturama (Mexico). Sin credenciales = comprobante informativo solamente.
cfdi.enabled=${CFDI_ENABLED:false}
cfdi.facturama-username=${CFDI_FACTURAMA_USER:}
cfdi.facturama-password=${CFDI_FACTURAMA_PASSWORD:}
cfdi.facturama-sandbox=${CFDI_FACTURAMA_SANDBOX:true}

# SMTP — variables en .env (ver deploy/DEPLOY.md). Sin SMTP_HOST = modo demo en pantalla.
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.ssl.enable=${SMTP_SSL:false}
