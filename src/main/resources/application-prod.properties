# Perfil prod: detras de proxy HTTPS (Nginx, Railway, Render, etc.)
server.port=${PORT:8080}
server.forward-headers-strategy=framework
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax
server.jsp-servlet.init-parameters.development=false
server.error.include-message=never
server.error.include-stacktrace=never

# Railway: si no defines APP_BASE_URL, usa el dominio publico del servicio
app.base-url=${APP_BASE_URL:https://${RAILWAY_PUBLIC_DOMAIN:}}

# Validaciones al arrancar (DeployStartupChecker)
deploy.validar-al-inicio=true
